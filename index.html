<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐻 น้องหมีผจญภัย</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>🐻 น้องหมีผจญภัย</h1>
  <p>สอนน้องหมีเขียนโปรแกรม ผ่านทั้ง 5 ด่าน!</p>
</div>

<!-- Level select -->
<div class="levels" id="level-tabs"></div>
<div class="prog-bar-wrap" style="max-width:260px;margin-bottom:14px">
  <div class="prog-bar" id="progress-bar" style="width:0%"></div>
</div>

<!-- Game -->
<div class="game">
  <div class="grid-wrap">
    <div class="level-badge">
      <span class="lv" id="lv-label">ด่านที่ 1</span>
      <span class="nm" id="lv-name">ก้าวแรก</span>
      <span class="diff" id="lv-diff">⭐ ง่าย</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="rp">
    <div class="obj">
      <h3>📋 โจทย์</h3>
      <p id="objective">พาน้องหมี 🐻 ไปยังกล่องสมบัติ 🎁</p>
    </div>

    <div class="step-info">
      <div>บล็อค: <span id="block-count">0</span></div>
      <div>เป้าหมาย 3 ดาว: <span id="target-steps">—</span> บล็อค</div>
      <div class="stars-display" id="stars-preview">⭐⭐⭐</div>
    </div>

    <div class="prog-label">โปรแกรม</div>
    <div class="prog" id="prog">
      <!-- <div class="flag-blk">🚩</div> -->
      <div class="hint" id="hint">ลากบล็อคคำสั่งมาวางที่นี่</div>
    </div>

    <div class="palette" id="palette">
      <div class="palette-label">บล็อคคำสั่ง</div>
    </div>

    <div class="btn-row">
      <button class="rst" onclick="resetGame()">↺ เริ่มใหม่</button>
      <button class="run" onclick="runProgram()">▶ รัน!</button>

    </div>

    <div class="msg" id="msg"></div>


  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <span class="emoji" id="win-emoji">🎉</span>
    <h2 id="win-title">เยี่ยมมาก!</h2>
    <p id="win-desc">ผ่านด่านแล้ว!</p>
    <div id="win-stars" style="font-size:28px;margin-bottom:16px">⭐⭐⭐</div>
    <button class="win-next" id="win-next-btn" onclick="nextLevel()">ด่านถัดไป ➡</button>
    <button class="win-close" onclick="closeWin()">เล่นอีกครั้ง</button>
  </div>
</div>

<!-- Event overlay -->
<div class="event-overlay" id="event-overlay">
  <div class="event-box">
    <span class="event-emoji" id="event-emoji">💧</span>
    <h2 id="event-title">จมน้ำ!</h2>
    <p id="event-text">น้องหมีจมน้ำแล้ว ลองใหม่อีกครั้ง</p>
    <!-- <button class="event-close" onclick="closeEventOverlay()">ปิด</button> -->
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
